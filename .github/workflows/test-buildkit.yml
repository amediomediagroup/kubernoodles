name: 🧪 Test building with BuildKit (Daemonless)

on:
  push:

jobs:
  build:
    runs-on: test-k8s
    
    # ---------------------------------------------------------
    # 1. CẤU HÌNH PERMISSIONS (QUYỀN CỦA GITHUB ACTIONS)
    # ---------------------------------------------------------
    permissions:
      attestations: write
      contents: read      # Quyền đọc source code
      packages: write     # Bắt buộc: Quyền ghi/push image lên ghcr.io
      id-token: write     # Bắt buộc: Nếu sau này bạn đổi sang AWS OIDC

    # ---------------------------------------------------------
    # 2. CẤU HÌNH CONTAINER (QUYỀN CỦA HỆ ĐIỀU HÀNH)
    # ---------------------------------------------------------
    container:
      image: moby/buildkit:rootless
      # options: >-
      #   --user root
      #   --privileged
      #   --security-opt seccomp=unconfined
      #   --security-opt apparmor=unconfined
      #   --entrypoint ""

    steps:
      - name: Build and push with Cache & Multi-arch
        shell: sh
        env:
          REGISTRY: ghcr.io
          IMAGE_NAME: amediomediagroup/kubernoodles/kaniko-build:test
          # Thêm biến CACHE để lưu trữ các layer build chung
          CACHE_IMAGE: amediomediagroup/kubernoodles/kaniko-build:buildcache
          BUILDKITD_FLAGS: "--rootless --oci-worker-no-process-sandbox"
          
        run: |
          echo "🚀 Khởi tạo môi trường Rootless..."
          mkdir -p /run/user/1000
          export XDG_RUNTIME_DIR=/run/user/1000

          echo "🔑 Cấu hình Authentication cho GHCR..."
          export DOCKER_CONFIG="/tmp/.docker"
          mkdir -p $DOCKER_CONFIG
          
          # Sử dụng tr -d '\n' để đảm bảo chuỗi Base64 nằm trên một dòng duy nhất, không bị lỗi JSON parser
          AUTH_TOKEN=$(echo -n "trucpd:${{ secrets.GITHUB_TOKEN }}" | base64 | tr -d '\n')
          
          # Ghi đè file config.json với định dạng phẳng, chuẩn chỉ cho cả ghcr.io và https://ghcr.io
          echo "{\"auths\": {\"ghcr.io\": {\"auth\": \"$AUTH_TOKEN\"}, \"https://ghcr.io\": {\"auth\": \"$AUTH_TOKEN\"}}}" > $DOCKER_CONFIG/config.json

          echo "🔨 Bắt đầu build với Cache và Multi-arch..."
          buildctl-daemonless.sh build \
            --frontend dockerfile.v0 \
            --opt context=https://github.com/trucpd/kubernoodles.git#refs/heads/main \
            --opt filename=images/kaniko-build-test.Dockerfile \
            `# 1. CẤU HÌNH MULTI-ARCH (Build đồng thời cho AMD64 và ARM64)` \
            --opt platform=linux/amd64,linux/arm64 \
            `# 2. CẤU HÌNH XUẤT CACHE (Đẩy cache lên Registry)` \
            --export-cache type=registry,ref=$REGISTRY/$CACHE_IMAGE,mode=max \
            `# 3. CẤU HÌNH NHẬP CACHE (Kéo cache từ Registry về trước khi build)` \
            --import-cache type=registry,ref=$REGISTRY/$CACHE_IMAGE \
            `# 4. XUẤT IMAGE VÀ PUSH` \
            --output type=image,name=$REGISTRY/$IMAGE_NAME,push=true
